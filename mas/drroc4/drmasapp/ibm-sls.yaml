merge-key: "mas/drroc4/drmasapp"

ibm_sls:
  # Confirm current/target SLS channel before deploy.
  channel: CHANGE_ME_SLS_CHANNEL

  # Use your RWO storage class.
  storageClass: CHANGE_ME_RWO_STORAGE_CLASS

  # MAS license file content, stored in Vault.
  sls_entitlement_file: "<path:secret/data/mas/drroc4/drmasapp/license#license_file>"

  # IBM image pull secret.
  ibm_entitlement_key: "<path:secret/data/mas/drroc4/entitlement#image_pull_secret_b64>"

  # Optional. Use if your SLS setup requires a registration key.
  registration_key: "<path:secret/data/mas/drroc4/drmasapp/sls#registration_key>"
