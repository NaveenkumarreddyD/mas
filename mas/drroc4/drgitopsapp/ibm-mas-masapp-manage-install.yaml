merge-key: "mas/drroc4/drgitopsapp"

# IBM MAS GitOps 8.0.0 uses top-level key ibm_suite_app_manage_install for Manage.
ibm_suite_app_manage_install:
  ibm_entitlement_key: "<path:secret/data/mas/drroc4/entitlement#image_pull_secret_b64>"
  mas_instance_id: drgitopsapp
  mas_app_id: manage
  mas_edition: essentials-maintenance
  mas_app_namespace: mas-drgitopsapp-manage
  mas_app_channel: "8.7.x"
  mas_app_catalog_source: ibm-operator-catalog
  mas_app_api_version: apps.mas.ibm.com/v1
  mas_app_kind: ManageApp
  mas_app_install_plan: Automatic

  # On-prem: keep IBM sample cloud/AWS sync hooks disabled unless IBM confirms otherwise for your support case.
  run_sync_hooks: false
  mas_manual_cert_mgmt: false

  # Operator-level ManageApp spec. Workspace/application activation is in ibm-mas-masapp-configs.yaml.
  mas_app_spec: {}
