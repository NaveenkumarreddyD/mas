# This is a PATCH FRAGMENT for the OpenShift GitOps ArgoCD CR.
# Do not apply this file directly as a full ArgoCD resource.
#
# Review your installed OpenShift GitOps version before applying.
# The goal is to:
#   - mount argocd-vault-plugin binary into repo-server sidecar
#   - define a CMP sidecar named argocd-vault-plugin-helm
#   - inject argocd-vault-plugin-credentials Secret into that sidecar
#
# Because OpenShift GitOps CR schema varies by version, validate this fragment
# against your ArgoCD CR before using.
spec:
  repo:
    volumes:
      - name: custom-tools
        emptyDir: {}
      - name: cmp-plugin
        configMap:
          name: cmp-plugin
    initContainers:
      - name: download-tools
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: [sh, -c]
        args:
          - >-
            microdnf install -y tar gzip curl &&
            curl -L -o /custom-tools/argocd-vault-plugin
            https://github.com/argoproj-labs/argocd-vault-plugin/releases/download/CHANGE_ME_AVP_VERSION/argocd-vault-plugin_CHANGE_ME_AVP_VERSION_linux_amd64
            && chmod +x /custom-tools/argocd-vault-plugin
        volumeMounts:
          - mountPath: /custom-tools
            name: custom-tools
    sidecarContainers:
      - name: avp-helm
        image: quay.io/argoproj/argocd:CHANGE_ME_ARGOCD_IMAGE_TAG
        command: [/var/run/argocd/argocd-cmp-server]
        envFrom:
          - secretRef:
              name: argocd-vault-plugin-credentials
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          - mountPath: /tmp
            name: tmp
          - mountPath: /usr/local/bin/argocd-vault-plugin
            subPath: argocd-vault-plugin
            name: custom-tools
          - mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: avp-helm.yaml
            name: cmp-plugin
